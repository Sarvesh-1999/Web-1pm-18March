<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1 style="text-align: center">Learn Lists in HTML</h1>

    <!-- ORDERED LIST -->

    <!-- 
    type = "1 / A / a / I / i"
    start = defines from where to start the order
    reversed = reverse the order not list item
    -->
    <ol type="1" start="11" reversed>
      <li>Frontend</li>
      <li>Middleware</li>
      <li>Backend</li>
    </ol>

    <!-- UNORDERED LIST -->
    <!-- 
    type = "disc / circle / sqaure"
    -->
    <ul type="circle">
      <li>HTML</li>
      <li>CSS</li>
      <li>JS</li>
    </ul>

    <!-- DESCRIPTION / DEFINATION LIST -->
    <dl>
        <dt>Description Term</dt>
        <dd>Description Defination</dd>
    </dl>


  </body>
</html>
