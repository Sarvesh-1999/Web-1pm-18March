<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Learn Forms in HTML</h1>

    <fieldset>
      <legend>Fill This Form</legend>

      <form>
        <label for="firstname">Firstname</label>
        <input
          type="text"
          id="firstname"
          name="firstname"
          placeholder="Enter Firstname"
          required
        />
        <sup style="color: red">*</sup>

        <br /><br />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter Email" />

        <br /><br />

        <label for="password">Password</label>
        <input
          type="password"
          name="password"
          id="password"
          placeholder="Enter Password"
        />

        <br /><br />

        <label for="gender">Gender</label>

        <label for="male">male</label>
        <input type="radio" name="gender" id="male" value="male" />

        <label for="female">female</label>
        <input type="radio" name="gender" id="female" value="female" />

        <br /><br />

        <label for="country">Country</label>
        <select name="country" id="country">
          <option value="" disabled selected>select here</option>
          <option value="india">India</option>
          <option value="china">China</option>
          <option value="russia">Russia</option>
        </select>

        <br /><br />

        <label for="course">Course</label>
        <input type="text" name="course" id="course" list="courseList" />
        <datalist id="courseList">
          <option value="Mern">HTML,CSS,REACT</option>
          <option value="Java Full Stack">Java Full Stack</option>
        </datalist>

        <br /><br />

        <label for="dob">DOB</label>
        <input
          type="date"
          name="dob"
          id="dob"
          min="2000-01-01"
          max="2030-12-31"
        />

        <br /><br />

        <label for="phoneno">Phone No</label>
        <input
          type="tel"
          name="phoneno"
          id="phoneno"
          minlength="10"
          maxlength="10"
        />

        <br /><br />

        <label for="resume">Resume</label>
        <input type="file" name="resume" id="resume" multiple />

        <br /><br />

        <button type="submit">Submit Btn Tag</button>
        <input type="submit" value="Submit Input" />

        <button type="reset">Reset Btn Tag</button>
        <input type="reset" value="Reset Input" />
      </form>
      
    </fieldset>
  </body>
</html>
