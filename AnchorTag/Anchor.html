<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Learn Anchor Tag</h1>

    <!-- open in same tab -->
    <a href="https://www.google.com" target="_self">Google</a>

    <br>
    <br>

    <!-- open in new tab -->
    <a href="./myWebPage.html" target="_blank">My-WebPage</a>

    <br>
    <br>

    <!-- target = "_parent" and target = "_top" -->
    <iframe src="./Child1.html" frameborder="1" height="300" width="400"></iframe>

  </body>
</html>
