<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      /* DECENDENT */
      section div {
        background-color: yellow;
      }

      /* CHILD */
      section > div {
        background-color: red;
      }

      /* GENERAL SIBLING */
      section ~ div {
        background-color: aqua;
      }

      /* ADJACENT SIBLING */
      section + div {
        background-color: blue;
      }
    </style>
  </head>
  <body>
    <h1>Learn Combinator Selectors</h1>
    <!-- 
    There are 4 types:
    1) Decendent
        - used to target child as well as nested child elements
        - denoted by empty space

    2) Child
        - used to target only child elements
        - denoted by greater than (>) symbol

    3) General Siblings
        - used to target multiple elements which is present after the closing tag of targetted element
        - denoted by tilde (~) symbol

    4) Adjacent Sibling
        - used to target first element which is immediate next to the closing tag of targetted element
        - denoted by plus (+) symbol
    -->

    <section>
      <div>div 1</div>
      <div>div 2</div>
      <article>
        <div>div 3</div>
        <div>div 4</div>
      </article>
      <div>div 5</div>
      <div>div 6</div>
    </section>
    <div>div 7</div>
    <div>div 8</div>
    <div>div 9</div>
  </body>
</html>
