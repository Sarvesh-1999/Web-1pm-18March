<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .face {
        height: 300px;
        width: 300px;
        background-color: yellow;
      }
      .eyes-container{
        display: flex;
        justify-content: center;
        gap: 30px;
        padding-top: 30px;
      }
      .eyes{
        height: 100px;
        width: 100px;
        background-color: white;
      }
      .eye-ball{
        height: 50px;
        width: 50px;
        background-color: black;
      }
      .mouth-container{
        padding-top: 50px;
      }
      .mouth{
        margin: 0 auto;
        height: 80px;
        width: 100px;
        background-color: crimson;
        border-radius: 0 0 50% 50%;
      }
    </style>
  </head>
  <body>
    <section class="face">

        <article class="eyes-container">
            
            <div class="eyes">
                <div class="eye-ball"></div>
            </div>
            <div class="eyes">
                <div class="eye-ball"></div>
            </div>
        
        </article>


        <article class="mouth-container">
            <div class="mouth"></div>
        </article>

    </section>
  </body>
</html>
