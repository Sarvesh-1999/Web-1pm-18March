<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .grid-container {
        height: 80vh;
        width: 100%;
        background-color: yellow;
        display: grid;
        /* grid-template-rows: 200px 100px 150px;*/
        grid-template-columns: repeat(3 ,  1fr);
        /* row-gap: 50px;
        column-gap: 10px; */
        gap: 10px;
        justify-items: center;
        align-items: center;
      }
      div{
        height: 100px;
        width: 100px;
        background-color: red;
      }
      .item1{
        justify-self: end;
        align-self: end;
      }
      .item3{
        justify-self: start;
        align-self: end;
      }
      .item4{
        justify-self: end;
        align-self: start;
      }
      .item6{
        justify-self: start;
        align-self: start;
      }

    </style>
  </head>








<body>
    <h1>Learn Grid</h1>

    <main class="grid-container">
        <div class="item1"></div>
        <div class="item2"></div>
        <div class="item3"></div>
        <div class="item4"></div>
        <div class="item5"></div>
        <div class="item6"></div>
    </main>

  



</body>
</html>
