<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .box1 {
        height: 200px;
        width: 200px;
        background-color: yellow;
        border: 10px solid black;
        
        /* padding-top: 10px;
        padding-left: 10px;
        padding-bottom: 10px;
        padding-right: 10px; */
        /* margin-left: 10px;
        margin-right: 10px;
        margin-bottom: 10px;
        margin-top: 10px; */
      
        padding: 50px;
        margin: 10px;
        box-sizing: content-box;
      }

      .box2{
        height: 200px;
        width: 200px;
        background-color: aqua;
        border: 10px solid black;
        padding: 50px;
        margin: 10px;
        box-sizing: border-box;
      }

    </style>
  </head>
  <body>
    <h1>Learn Box-Modal</h1>

    <div class="box1">hello world</div>

    <div class="box2">hello world</div>

  </body>
</html>
