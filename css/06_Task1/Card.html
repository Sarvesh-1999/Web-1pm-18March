<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./Card.css" />
  </head>
  <body>
    <main>
      <article class="card-container">
        <img class="product-image" src="../../images/user1.png" alt="" />

        <h1 class="product-title">
          Adidas Originals
          <span class="product-price"> $29.99 </span>
        </h1>
        <p class="product-description">Men's running tshirt</p>

        <h5 class="product-color-size">SIZE</h5>
        <section class="size-color-varient">
          <div>XS</div>
          <div>S</div>
          <div>M</div>
          <div>L</div>
          <div>XL</div>
        </section>

        <h5 class="product-color-size">COLOR</h5>
        <section class="size-color-varient">
          <div class="color1"></div>
          <div class="color2"></div>
          <div class="color3"></div>
        </section>

        <div class="btn-group">
            <button>BUY NOW</button>
            <button>ADD TO CART</button>
        </div>
        

      </article>


    </main>
  </body>
</html>
